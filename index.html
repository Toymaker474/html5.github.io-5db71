<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#03050a"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="PennySpawn Q"><link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="icon.svg" type="image/svg+xml"><title>PennySpawn Quantum Agent OS</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 20% 0,#15284c,transparent 36%),radial-gradient(circle at 90% 5%,#382050,transparent 34%),#03050a;color:#f8fbff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}main{width:min(440px,calc(100% - 28px));padding:28px;text-align:center;border:1px solid #ffffff16;border-radius:30px;background:#0d1422d9;box-shadow:0 35px 110px #000}.q{width:78px;height:78px;margin:auto;display:grid;place-items:center;border-radius:27px;background:conic-gradient(#caff4b,#55eaff,#b086ff,#ff63d7,#caff4b);color:#04060a;font-size:31px;font-weight:1000;animation:p 1.4s ease-in-out infinite}@keyframes p{50%{transform:scale(1.08);filter:drop-shadow(0 0 28px #55eaff)}}h1{letter-spacing:-.05em;margin:19px 0 7px}p{color:#8290a7;font-size:12px;line-height:1.55}.bar{height:8px;margin-top:18px;border-radius:999px;overflow:hidden;background:#ffffff0b}.bar i{display:block;height:100%;width:18%;border-radius:inherit;background:linear-gradient(90deg,#caff4b,#55eaff,#b086ff);transition:.25s}.error{color:#ff8ba0}button{border:0;border-radius:14px;padding:12px 17px;background:#caff4b;color:#061009;font-weight:900}</style></head><body><main id="boot"><div class="q">Q₿</div><h1>Spawning Quantum Prime</h1><p id="status">Loading the local swarm…</p><div class="bar"><i id="bar"></i></div></main><script>(async()=>{const status=document.getElementById('status'),bar=document.getElementById('bar');try{if(!('DecompressionStream'in window))throw Error('This Safari version cannot open the compressed local app. Update iOS and refresh.');const parts=[];for(let i=0;i<6;i++){status.textContent='Loading quantum state '+(i+1)+' of 6…';const r=await fetch('quantum/q'+i+'.dat?v=1',{cache:'no-store'});if(!r.ok)throw Error('Missing quantum state '+(i+1));parts.push((await r.text()).trim());bar.style.width=Math.round((i+1)/6*78)+'%'}status.textContent='Collapsing the app into reality…';const raw=Uint8Array.from(atob(parts.join('')),c=>c.charCodeAt(0)),stream=new Blob([raw]).stream().pipeThrough(new DecompressionStream('gzip')),html=await new Response(stream).text();bar.style.width='100%';document.open();document.write(html);document.close()}catch(e){document.getElementById('boot').innerHTML='<div class="q">!</div><h1>PennySpawn did not collapse.</h1><p class="error">'+String(e.message||e)+'</p><button onclick="location.reload(true)">Refresh app</button>'}})()</script></body></html>
