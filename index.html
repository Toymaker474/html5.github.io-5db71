<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#050705"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="PennySpawn"><link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="icon.svg" type="image/svg+xml"><link rel="stylesheet" href="pennyspawn.css"><title>PennySpawn — Survival Agent OS</title></head><body><div id="boot" style="min-height:100vh;display:grid;place-items:center;color:#c9ff4a;font-family:-apple-system,sans-serif;background:#050705">Spawning PennySpawn…</div><script>fetch('app.html',{cache:'no-cache'}).then(r=>{if(!r.ok)throw Error('App shell unavailable');return r.text()}).then(h=>{document.body.innerHTML=h;return['pennyspawn-core-1.js','pennyspawn-core-2.js','pennyspawn-core-3.js','pennyspawn-features.js'].reduce((p,src)=>p.then(()=>new Promise((ok,no)=>{const s=document.createElement('script');s.src=src;s.onload=ok;s.onerror=()=>no(Error('Failed to load '+src));document.body.appendChild(s)})),Promise.resolve())}).catch(e=>{document.body.innerHTML='<main style="min-height:100vh;display:grid;place-items:center;padding:24px;color:#f6fff7;font-family:-apple-system,sans-serif;background:#050705;text-align:center"><div><h1 style="color:#c9ff4a">PennySpawn needs one refresh.</h1><p style="color:#8c9d92">'+String(e.message||e)+'</p><button onclick="location.reload()" style="border:0;border-radius:14px;padding:13px 18px;background:#c9ff4a;color:#071006;font-weight:900">Refresh app</button></div></main>'})</script></body></html>
