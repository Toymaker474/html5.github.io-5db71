name: Check PennySpawn Public UI

on:
  push:
    branches: ["main"]
    paths:
      - "pennyspawn-ai/**"
      - "netlify.toml"
      - ".github/workflows/pennyspawn-ui-check.yml"
  pull_request:
    paths:
      - "pennyspawn-ai/**"
      - "netlify.toml"
      - ".github/workflows/pennyspawn-ui-check.yml"

permissions:
  contents: read

jobs:
  public-ui-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm private server source is absent
        shell: bash
        run: test -z "$(git ls-files 'pennyspawn-ai/worker/**')"
      - name: Check browser JavaScript
        run: |
          node --check pennyspawn-ai/q.js
          node --check pennyspawn-ai/monetization-config.js
          node --check pennyspawn-ai/sw.js
      - name: Confirm required PWA files
        run: |
          test -s pennyspawn-ai/index.html
          test -s pennyspawn-ai/q.css
          test -s pennyspawn-ai/q.js
          test -s pennyspawn-ai/monetization-config.js
          test -s pennyspawn-ai/agent-catalog.json
          test -s pennyspawn-ai/app.webmanifest
          test -s pennyspawn-ai/sw.js
          test -s pennyspawn-ai/icon.svg
          test -s netlify.toml
      - name: Confirm zero-download engine
        shell: bash
        run: |
          ! grep -R "HuggingFaceTB\|onnx-community\|transformers@" pennyspawn-ai/index.html pennyspawn-ai/q.js pennyspawn-ai/sw.js
      - name: Confirm GitHub commercial guard
        shell: bash
        run: grep -q "github\\.io" pennyspawn-ai/q.js
