name: Deploy PennySpawn Worker

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Payment network"
        required: true
        type: choice
        default: testnet
        options:
          - testnet
          - mainnet

permissions:
  contents: read

env:
  PAY_TO: ${{ vars.PAY_TO }}
  ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pennyspawn-ai/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate owner configuration
        shell: bash
        run: |
          if [[ ! "$PAY_TO" =~ ^0x[0-9a-fA-F]{40}$ ]]; then
            echo "Repository variable PAY_TO must be a public 0x wallet address."
            exit 1
          fi
          if [[ -z "$ADMIN_TOKEN" || ${#ADMIN_TOKEN} -lt 20 ]]; then
            echo "ADMIN_TOKEN secret must contain at least 20 characters."
            exit 1
          fi

      - name: Configure selected network
        env:
          SELECTED_NETWORK: ${{ inputs.network }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'wrangler.jsonc';
          let text = fs.readFileSync(path, 'utf8');
          text = text.replace('REPLACE_WITH_PUBLIC_0X_WALLET', process.env.PAY_TO);
          if (process.env.SELECTED_NETWORK === 'mainnet') {
            text = text
              .replace('eip155:84532', 'eip155:8453')
              .replace('https://x402.org/facilitator', 'https://api.cdp.coinbase.com/platform/v2/x402');
          }
          fs.writeFileSync(path, text);
          NODE

      - run: npm install --no-audit --no-fund
      - run: npm run check

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: pennyspawn-ai/worker
          command: deploy
          secrets: |
            ADMIN_TOKEN
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
