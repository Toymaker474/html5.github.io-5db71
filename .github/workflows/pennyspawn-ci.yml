name: Check PennySpawn

on:
  push:
    branches: ["main"]
    paths:
      - "pennyspawn-ai/worker/**"
      - ".github/workflows/pennyspawn-ci.yml"
  pull_request:
    paths:
      - "pennyspawn-ai/worker/**"
      - ".github/workflows/pennyspawn-ci.yml"

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pennyspawn-ai/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npm run check
      - run: npx wrangler deploy --dry-run
